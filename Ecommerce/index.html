<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Real Real Shop</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet" />
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
<link rel="stylesheet" href="style.css" />
</head> 

<body>

  <header>
    <nav class="navbar navbar-dark bg-dark px-4">
      <a class="navbar-brand" href="#">Real Real Shop</a>

      <input 
        type="search" 
        id="buscador" 
        class="form-control w-50" 
        placeholder="Buscar producto..." />

      <button class="btn btn-outline-light position-relative" id="btnCarrito" data-bs-toggle="offcanvas" data-bs-target="#offcanvasRight" aria-controls="offcanvasRight">
        <i class="bi bi-cart3"></i>
        <span class="badge bg-danger position-absolute top-0 start-100 translate-middle d-none" id="badgeCarrito">0</span>
      </button>
    </nav>
  </header>

    <main class="container">
        <section class="my-4">
             <div class="categorias row row-cols-1 row-cols-md-4 g-4 mt-4" id="contenedorCategorias"></div>
        </section>
    <div class="row row-cols-1 row-cols-md-3 g-4" id="contenedorProductos"></div>
    <div class="modal fade" id="productmodal" tabindex="-1" aria-labelledby="productmodalLabel" aria-hidden="true"></div>
  </main>

   <div class="offcanvas offcanvas-end" tabindex="-1" id="offcanvasRight" aria-labelledby="offcanvasRightLabel">
  <div class="offcanvas-header">
    <h5 class="offcanvas-title" id="offcanvasRightLabel">Mi carrito</h5>
    <button type="button" class="btn-close" data-bs-dismiss="offcanvas" aria-label="Close"></button>
  </div>
  <div class="offcanvas-body" id="offcanvasBody"></div>
  <div class="offcanvas-footer d-flex justify-content-center align-items-center gap-3 py-3">
      <button class="btn btn-dark" id="btnFinalizar">Finalizar compra</button>
      <button class="btn btn-dark" id="btnVaciar">Vaciar carrito</button>
  </div>
  </div>

    <footer>
        <p>Alan Rusch 2026 todos los derechos reservados</p>
    </footer>






<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

<script src="productos.js"></script>
<script src="carrito.js"></script>
<script src="buscador.js"></script>
<script src="categorias.js"></script>

</body>
</html>
